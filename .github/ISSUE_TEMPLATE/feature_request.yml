name: Feature request
description: Propose a bounded local-first capability.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: input
    id: version
    attributes: {label: Version}
    validations: {required: true}
  - type: input
    id: os
    attributes: {label: Operating system}
    validations: {required: true}
  - type: input
    id: python
    attributes: {label: Python version}
    validations: {required: true}
  - type: input
    id: adapter
    attributes: {label: Adapter}
    validations: {required: true}
  - type: textarea
    id: repro
    attributes: {label: Minimal use case}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected result and safety boundary}
    validations: {required: true}
  - type: dropdown
    id: gate
    attributes:
      label: "Did you run the unified local gate?"
      options: ["Yes", "No", "Not applicable"]
    validations: {required: true}
