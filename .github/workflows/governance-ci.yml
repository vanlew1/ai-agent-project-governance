name: Governance CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements-governance.txt
      - run: python scripts/run_governance_ci.py
  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements-governance.txt
      - run: python scripts/check_template_integrity.py
      - run: python scripts/check_python_syntax.py
      - name: Validate adapter detection
        shell: pwsh
        run: |
          python scripts/agent_detect_adapter.py --root . detect
          if ($LASTEXITCODE -eq 2) {
            Write-Host "Generic adapter fallback is expected for this template repository."
            exit 0
          }
          exit $LASTEXITCODE
