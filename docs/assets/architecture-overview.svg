<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc"><title id="title">Governance runtime flow</title><desc id="desc">Task request flows through Preflight, Guard, Test, Verify, and Close with a local multi-agent extension.</desc><defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0 L10 4 L0 8Z" fill="#475569"/></marker></defs><rect width="1200" height="430" fill="#f8fafc" rx="24"/><g font-family="Arial,sans-serif" font-size="21" font-weight="700" text-anchor="middle" fill="#1e3a8a"><rect x="38" y="82" width="160" height="72" rx="12" fill="#dbeafe"/><text x="118" y="125">Task Request</text><rect x="258" y="82" width="160" height="72" rx="12" fill="#dbeafe"/><text x="338" y="125">Preflight</text><rect x="478" y="82" width="160" height="72" rx="12" fill="#dbeafe"/><text x="558" y="125">Guard + Test</text><rect x="698" y="82" width="160" height="72" rx="12" fill="#dbeafe"/><text x="778" y="125">Verify</text><rect x="918" y="82" width="160" height="72" rx="12" fill="#dbeafe"/><text x="998" y="125">Close</text></g><g stroke="#475569" stroke-width="3" marker-end="url(#a)"><line x1="198" y1="118" x2="252" y2="118"/><line x1="418" y1="118" x2="472" y2="118"/><line x1="638" y1="118" x2="692" y2="118"/><line x1="858" y1="118" x2="912" y2="118"/></g><rect x="370" y="270" width="460" height="88" rx="14" fill="#dcfce7"/><text x="600" y="306" font-family="Arial,sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#166534">Local multi-agent: DAG → single writer → handoff</text></svg>
