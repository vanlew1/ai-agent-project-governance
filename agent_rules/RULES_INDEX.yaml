version: "1.0"

entry:
  - AGENTS.md
  - agent_rules/00_rule_router.md
  - agent_rules/01_task_classification.md

lightweight_entry:
  description: "A 类低风险任务的轻量入口，优先节省上下文，但不能替代完整治理规则"
  files:
    - docs/AGENT_QUICK_CONTEXT.md
    - README.md
  defaults:
    - "先用 rg 定位相关代码或测试，再读取局部片段"
    - "不默认读取完整架构、实施计划或规则索引"
    - "测试输出仅保留摘要"
    - "轻量任务最低报告包含修改文件、核心改动、测试/检查、未触碰范围、是否需要升级"
  allowed_scope:
    - "文案修改、README 小修、注释修改、局部格式修复"
    - "已有函数内极小调整"
    - "单个测试补充"
    - "不涉及数据写入、架构、Git、外部 API 的小任务"
  escalation_required_when:
    - "新增文件或模块"
    - "修改架构边界"
    - "修改数据库、缓存、production、正式证据库"
    - "修改 Git 存档、push、remote"
    - "调用 LLM API、外部 API、联网抓取"
    - "全量扫描、大规模测试、成本较高任务"
    - "安全、隐私、密钥、token"
    - "跨模块改动"
    - "任务范围不明确"
  authority: "如与 AGENTS.md、RULES_INDEX.yaml 或 agent_rules/ 下完整规则冲突，以完整规则树为准"


execution_contracts:
  token_efficient_execution:
    source: agent_rules/14_cost_aware_testing_rules.md
    description: "低 token、低重复、人工前置门优先的执行合同；不得削弱数据安全、测试质量或验收门禁"
    read_when:
      - "真实外部 API、联网抓取、connectivity probe、登录态、云服务或网络/VPN/TUN 条件"
      - "正式数据库、production、evidence、pool、migration 或高成本写入"
      - "大规模数据、批量任务、回归测试、长时间任务或高成本验证"
      - "任务被阻塞、需要 checkpoint、需要复用其他分支资产或避免重复建设"
    gate_0_required_before:
      - code_changes
      - full_rule_tree_read
      - full_regression
      - database_backup
      - live_external_request
project_modes:
  DISCOVERY:
    description: "需求、目标、边界或施工方案尚不明确；只允许探索、提问、草稿和未知项整理"
    required_rules:
      - agent_rules/15_plan_adaptation_rules.md
    primary_files:
      - docs/PROJECT_BRIEF_DRAFT.md
      - docs/OPEN_QUESTIONS.md
      - docs/BOOTSTRAP_DECISION.md
    protected_from_final_updates:
      - docs/ARCHITECTURE.md
      - docs/MODULE_REGISTRY.yaml
      - docs/TASK_REGISTRY.yaml
      - docs/CHANGELOG.md

  ADAPTATION:
    description: "方向基本明确；把方案转成项目专属规则、架构草案、模块边界和验证计划"
    required_rules:
      - agent_rules/15_plan_adaptation_rules.md
      - agent_rules/02_architecture_rules.md
      - agent_rules/11_project_specific_rules.md
    primary_files:
      - docs/IMPLEMENTATION_PLAN.md
      - docs/ARCHITECTURE.md
      - docs/MODULE_REGISTRY.yaml
      - agent_rules/11_project_specific_rules.md
    confirmation_required_before:
      - code_changes
      - task_registry_finalization
      - changelog_updates
      - real_external_access

  EXECUTION:
    description: "施工方案已确认；按任务等级、模块边界和验证规则执行开发"
    required_rules:
      - agent_rules/15_plan_adaptation_rules.md
      - agent_rules/01_task_classification.md

task_types:
  A_light:
    description: "小范围修复、文案、注释、局部测试、已有函数轻量调整"
    required_rules:
      - docs/AGENT_QUICK_CONTEXT.md
      - agent_rules/task_cards/A_light_task.md
      - agent_rules/06_data_safety_rules.md
      - agent_rules/07_testing_rules.md
      - agent_rules/11_project_specific_rules.md
    github_research_required: false
    full_trace_required: false
    antigravity_audit_required: false

  B_standard:
    description: "已有模块内新增子能力、新增脚本、新增测试、局部流程调整、引入外部建议"
    required_rules:
      - agent_rules/task_cards/B_standard_task.md
      - agent_rules/02_architecture_rules.md
      - agent_rules/04_trace_and_index_rules.md
      - agent_rules/05_external_advice_adaptation_rules.md
      - agent_rules/06_data_safety_rules.md
      - agent_rules/07_testing_rules.md
      - agent_rules/11_project_specific_rules.md
    conditional_rules:
      open_source:
        trigger: "当前仓库无现成实现、方案复杂、需要额外参考时"
        rules:
          - agent_rules/03_open_source_research_rules.md
      ai_review:
        trigger: "涉及自动分类、自动摘要、自动判断或批量初筛时"
        rules:
          - agent_rules/08_ai_auto_review_rules.md
      code_quality:
        trigger: "涉及新增代码、重构、文件拆分或复杂脚本时"
        rules:
          - agent_rules/12_code_quality_gates.md
      versioning:
        trigger: "涉及新增文件、规则变更、阶段性收口或版本发布时"
        rules:
          - docs/VERSIONING.md
          - docs/TASK_REGISTRY.yaml
          - docs/CHANGELOG.md
      git_backup:
        trigger: "涉及本地存档、提交、推送或 GitHub 上传时"
        rules:
          - agent_rules/13_git_and_backup_rules.md
      cost_aware_testing:
        trigger: "涉及大规模数据、批量任务、联网请求、回归测试或长时间任务时"
        rules:
          - agent_rules/14_cost_aware_testing_rules.md
      plan_adaptation:
        trigger: "施工方案尚未确认、需求仍在逐步沟通、或需要把方案转成项目专属框架时"
        rules:
          - agent_rules/15_plan_adaptation_rules.md
      external_access:
        trigger: "涉及外部平台、网站、API、登录态、爬虫、浏览器自动化、Webhook、云服务、生产系统、数据导入或数据导出时"
        rules:
          - agent_rules/15_plan_adaptation_rules.md
          - agent_rules/06_data_safety_rules.md
          - agent_rules/14_cost_aware_testing_rules.md
    github_research_required: conditional
    full_trace_required: light
    antigravity_audit_required: false

  C_major:
    description: "新增独立模块、重要架构调整、数据库结构调整、批量写入、发布前关键改动"
    required_rules:
      - agent_rules/task_cards/C_major_task.md
      - agent_rules/02_architecture_rules.md
      - agent_rules/03_open_source_research_rules.md
      - agent_rules/04_trace_and_index_rules.md
      - agent_rules/05_external_advice_adaptation_rules.md
      - agent_rules/06_data_safety_rules.md
      - agent_rules/07_testing_rules.md
      - agent_rules/08_ai_auto_review_rules.md
      - agent_rules/10_closure_rules.md
      - agent_rules/11_project_specific_rules.md
      - agent_rules/12_code_quality_gates.md
      - docs/VERSIONING.md
      - docs/TASK_REGISTRY.yaml
      - docs/CHANGELOG.md
      - agent_rules/13_git_and_backup_rules.md
      - agent_rules/14_cost_aware_testing_rules.md
      - agent_rules/15_plan_adaptation_rules.md
    recommended_rules:
      - agent_rules/09_antigravity_audit_rules.md
    github_research_required: true
    full_trace_required: true
    antigravity_audit_required: recommended

upgrade_triggers:
  - production_environment
  - database_write
  - batch_overwrite
  - cross_module_architecture
  - irreversible_operation
  - unconfirmed_implementation_plan
  - unclear_project_boundaries
  - unconfirmed_external_access_method
  - new_file_or_module
  - git_archive_or_remote_change
  - llm_api_or_external_api
  - web_fetch_or_scraping
  - large_scale_testing
  - security_or_secret_scope

global_forbidden:
  - "未经授权修改生产环境"
  - "未经授权写入、删除或重建数据库"
  - "审计任务中直接改代码"
  - "未验证却宣称完成"
  - "把自动输出直接当作正式结论"
  - "施工方案未确认前固化正式架构、模块表、任务表或变更日志"
  - "外部平台或数据接入方式未确认前实现真实访问代码"

governance_runtime:
  phase: PHASE_6_MULTI_AGENT_ORCHESTRATION
  architecture: docs/GOVERNANCE_RUNTIME_ARCHITECTURE.md
  module_registry: docs/GOVERNANCE_RUNTIME_MODULE_REGISTRY.yaml
  schema_directory: schemas
  runtime_behavior_enabled: true
  preflight_enabled: true
  state_persistence_enabled: true
  scope_enforcement_enabled: true
  approval_freshness_enabled: true
  forbidden_operation_guard_enabled: true
  adapters_enabled: true
  bootstrap_integration_enabled: true
  ci_enabled: true
  multi_agent_enabled: true
  test_planning_enabled: true
  test_execution_enabled: true
  automatic_closure_enabled: true